subpackage:
  - runtime*
name: smallstep+cli
version: 0.30.6
$version: 0.30.6
distribution: epsitec/
maintainer:
  name: Mathieu Schroeter
  email: schroeter@epsitec.ch
architecture:
  - source
description:
  brief: A zero trust swiss army knife for working with X509, OAuth, JWT, ...
  long: step is an easy-to-use CLI tool for building, operating, and automating Public Key Infrastructure (PKI) systems and workflows. It's also a client for the step-ca online Certificate Authority (CA) server. You can use it for many common crypto and X.509 operations—either independently, or with an online CA.
dependency:
  build:
    xcraft+base-build:
      - version: ''
        architecture: []
    google+go-26:
      - version: ''
        architecture: []
  make:
    xcraft+base-make:
      - version: ''
        architecture: []
bump: []
data:
  get:
    uri: 'https://github.com/smallstep/cli/archive/refs/tags/v<THIS.$VERSION>.tar.gz'
    mirrors: []
    ref: ''
    $ref: ''
    out: ''
    externals: true
    prepare: ''
  type: src
  configure: ''
  rules:
    type: script
    location: data/cli-<THIS.$VERSION>
    args:
      postinst: ''
      prerm: ''
      makeall: |-
        !GOPATH=$(pwd)/../go make build
         && chmod u+w -R $(pwd)/../go
      maketest: ''
      makeinstall: '!make install DESTDIR=<PEON.PREFIXDIR>/bin'
    test: none
    env:
      GOROOT: <PEON.ENV.GOROOT_26>
      PATH: <PEON.ENV.GOROOT_26>/bin:<PEON.ENV.PATH>
  deploy: ''
  env:
    path: []
    other: {}
  embedded: true
  runtime:
    configure: ''
