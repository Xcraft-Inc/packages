# Basic mdev.conf configuration
# Device            User:Group    Perms   Action

# Null and zero devices  
null                root:root     666
zero                root:root     666
random              root:root     444
urandom             root:root     444

tty                 root:root     666

snd/controlC[0-9]*  root:root     660     *which curl >/dev/null 2>&1 \
  && curl -X POST -H "Accept: application/json" "http://[::1]:8080/whispi/reload-audio"
