    adler+zlib-rpi64-x+bin:
      - version: ''
        architecture: []
        subpackage:
          - x+bin
    openssl+openssl3-rpi64-x+bin:
      - version: ''
        architecture: []
        subpackage:
          - x+bin
    bagder+curl-rpi64:
      - version: ''
