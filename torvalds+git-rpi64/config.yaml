    mirrors: []
    ref: ''
    $ref: ''
    out: ''
    externals: true
    prepare: ''
    $hash: 2.42.1@59222171748cafe549821b9ce9926face769ce058e5f4b90c32c9b708bb797b5.tar.gz
  type: src
  configure: ''
  rules:
    type: make
    location: data/git-<THIS.$VERSION>
    args:
      postinst: ''
      prerm: ''
      makeall: '-j<PEON.CPUS.COUNT> prefix=/usr NO_GETTEXT=Yes NO_PERL=Yes NO_TCLTK=Yes CC:=$(CC) CFLAGS:=$(CFLAGS) LDFLAGS:=$(LDFLAGS) NO_APPLE_COMMON_CRYPTO=1'
