subpackage:
  - runtime*
  - 'x+bin:linux-aarch64'
name: hailo-ai+ollama-rpi64
version: 5.3.0
$version: 5.3.0
distribution: raspberry/
maintainer:
  name: Mathieu Schroeter
  email: schroeter@epsitec.ch
architecture:
  - source
description:
  brief: Model zoo for Gen AI models for Hailo products
  long: ''
dependency:
  install:
    hailo-ai+hailort-rpi64:
      - version: ''
        architecture: []
    openssl+openssl3-rpi64:
      - version: ''
        architecture: []
  build:
    xcraft+peon:
      - version: ''
        architecture: []
    xcraft+build-essential:
      - version: ''
        architecture: []
    x-aarch64-linux+gnu-gcc-glibc-cross:
      - version: ''
        architecture: []
bump: []
data:
  get:
    uri: 'https://github.com/hailo-ai/hailo_model_zoo_genai/archive/refs/tags/v<THIS.$VERSION>.tar.gz'
    mirrors: []
    ref: ''
    $ref: ''
    out: ''
    externals: true
    prepare: ''
  type: src
  configure: |-
    !cd <THIS.DATA.RULES.LOCATION>
      && mkdir -p ./BUILD
      && cd ./BUILD
      && cmake -G Ninja
               -DCMAKE_FIND_ROOT_PATH=<PEON.PROD.ROOTDIR>
               -DCMAKE_INSTALL_PREFIX=<PEON.PREFIXDIR.X+BIN>
               -DCMAKE_BUILD_TYPE=Release ..
  rules:
    type: script
    location: data/hailo_model_zoo_genai-<THIS.$VERSION>
    args:
      postinst: ''
      prerm: ''
      makeall: '!ninja -C BUILD -j<PEON.CPUS.COUNT>'
      maketest: ''
      makeinstall: '!ninja -C BUILD install'
    test: none
    env:
      CC: aarch64-xcraft-linux-gnu-gcc
      CXX: aarch64-xcraft-linux-gnu-g++
  deploy: |-
    !  rm -rf <PEON.INSTALLDIR.X+BIN>/usr/include
    && rm -rf <PEON.INSTALLDIR.X+BIN>/usr/lib/cmake
  env:
    path: []
    other: {}
  embedded: true
  runtime:
    configure: ''
