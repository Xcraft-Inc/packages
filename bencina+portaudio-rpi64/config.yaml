subpackage:
  - runtime*
  - 'x+bin:linux-aarch64'
name: bencina+portaudio-rpi64
version: 19.7.0
$version: 19.7.0
distribution: raspberry/
maintainer:
  name: Mathieu Schroeter
  email: schroeter@epsitec.ch
architecture:
  - source
description:
  brief: Portable Cross-platform Audio I/O
  long: ''
dependency:
  install:
    alsa+lib-rpi64:
      - version: ''
        architecture: []
  build:
    xcraft+base-build:
      - version: ''
        architecture: []
    x-aarch64-linux+gnu-gcc-glibc-cross:
      - version: ''
        architecture: []
bump: []
data:
  get:
    uri: 'https://files.portaudio.com/archives/pa_stable_v190700_20210406.tgz'
    mirrors: []
    ref: ''
    $ref: ''
    out: ''
    externals: true
    prepare: ''
  type: src
  configure: |-
    !{bash}
    cd <THIS.DATA.RULES.LOCATION>
      && ./configure --prefix=/usr
                     --build=$MACHTYPE
                     --host=aarch64-xcraft-linux-gnu
                     --with-alsa
                     --without-oss
                     --without-jack
                     --without-asihpi
                     --without-winapi
  rules:
    type: script
    location: data/portaudio
    args:
      postinst: ''
      prerm: ''
      makeall: '!make -j<PEON.CPUS.COUNT>'
      maketest: ''
      makeinstall: |-
        !   make install DESTDIR=<PEON.INSTALLDIR>
         && find <PEON.INSTALLDIR> -name "*.pc" -exec sed -i 's|prefix=/usr|prefix=<PEON.INSTALLDIR>/usr|g' {} +
         && make install DESTDIR=<PEON.INSTALLDIR.X+BIN>
    test: none
    env:
      CC: aarch64-xcraft-linux-gnu-gcc
      CFLAGS: <PEON.ENV.CFLAGS> -L<PEON.PROD.ROOTDIR>/usr/lib
  deploy: ''
  env:
    path: []
    other: {}
  embedded: true
  runtime:
    configure: ''
