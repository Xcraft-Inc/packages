subpackage:
  - runtime*
  - 'x+bin:linux-aarch64'
name: raspberry+eeprom-rpi64
version: '2026.05.11-2712-1'
$version: '2026.05.11-2712'
distribution: raspberry/
maintainer:
  name: Mathieu Schroeter
  email: mathieu@schroetersa.ch
architecture:
  - source
description:
  brief: Raspberry Pi 4 and 5 bootloader EEPROMs
  long: 'Installation scripts and binaries for the Raspberry Pi 4 and Raspberry Pi 5 bootloader EEPROMs'
dependency:
  install:
    raspberry+utils-rpi64:
      - version: ''
        architecture: []
    raspberry+utils-rpi64-x+bin:
      - version: ''
        architecture: []
        subpackage:
          - x+bin
    openssl+openssl3-rpi64:
      - version: ''
        architecture: []
    openssl+openssl3-rpi64-x+bin:
      - version: ''
        architecture: []
        subpackage:
          - x+bin
    vanrossum+python3-rpi64:
      - version: ''
        architecture: []
    vanrossum+python3-rpi64-x+bin:
      - version: ''
        architecture: []
        subpackage:
          - x+bin
  build:
    xcraft+peon:
      - version: ''
        architecture: []
  make:
    xcraft+base-make:
      - version: ''
        architecture: []
bump:
  - carnotzet+os-base-whispi-rpi5b
data:
  get:
    uri: 'https://github.com/raspberrypi/rpi-eeprom/archive/refs/tags/v<THIS.$VERSION>.tar.gz'
    mirrors: []
    ref: ''
    $ref: ''
    out: ''
    externals: true
    prepare: ''
  type: src
  configure: ''
  rules:
    type: script
    location: data/rpi-eeprom-<THIS.$VERSION>
    args:
      postinst: ''
      prerm: ''
      makeall: ''
      maketest: ''
      makeinstall: |-
        cp('<PEON.ASSETS>/postinst', '<PEON.INSTALLDIR.X+BIN>/WPKG/postinst');

        cp('rpi-eeprom-config', '<PEON.INSTALLDIR.X+BIN>/usr/sbin/rpi-eeprom-config');
        cp('rpi-eeprom-update', '<PEON.INSTALLDIR.X+BIN>/usr/sbin/rpi-eeprom-update');
        cp('rpi-eeprom-digest', '<PEON.INSTALLDIR.X+BIN>/usr/sbin/rpi-eeprom-digest');

        cp('rpi-eeprom-update-default', '<PEON.INSTALLDIR.X+BIN>/etc/default/rpi-eeprom-update');

        cp('firmware-2712/default', '<PEON.INSTALLDIR.X+BIN>/usr/lib/firmware/raspberrypi/bootloader-2712/default');
    test: none
    env: {}
  deploy: ''
  env:
    path: []
    other: {}
  embedded: true
  runtime:
    configure: ''
