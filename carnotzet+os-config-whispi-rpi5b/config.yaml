subpackage:
  - runtime*
  - 'x+bin:linux-aarch64'
name: carnotzet+os-config-whispi-rpi5b
version: '0.1.0'
$version: '0.1.0'
distribution: raspberry/
maintainer:
  name: Mathieu Schroeter
  email: mathieu@schroetersa.ch
architecture:
  - source
description:
  brief: Base configuration files
  long: ''
dependency:
  build:
    xcraft+peon:
      - version: ''
        architecture: []
  make:
    xcraft+base-make:
      - version: ''
        architecture: []
bump:
  - carnotzet+os-base-whispi-rpi5b
  - carnotzet+rescuefs-whispi-rpi5b
data:
  get:
    uri: ''
    mirrors: []
    ref: <THIS.$VERSION>
    $ref: ''
    out: ''
    externals: true
    prepare: ''
  type: src
  configure: ''
  rules:
    type: script
    location: ''
    args:
      postinst: ''
      prerm: ''
      makeall: ''
      maketest: ''
      makeinstall: |-
        const {genOSRelease} = imp('raspberry');

        cp('<PEON.ASSETS>/conffiles',           '<PEON.INSTALLDIR.X+BIN>/WPKG/conffiles');
        cp('<PEON.ASSETS>/carnotzet.d',         '<PEON.INSTALLDIR.X+BIN>/boot/carnotzet.d');
        cp('<PEON.ASSETS>/config.txt',          '<PEON.INSTALLDIR.X+BIN>/boot/config.txt');
        cp('<PEON.ASSETS>/modules',             '<PEON.INSTALLDIR.X+BIN>/etc/modules');
        cp('<PEON.ASSETS>/wpa_supplicant.conf', '<PEON.INSTALLDIR.X+BIN>/etc/wpa_supplicant/wpa_supplicant.conf');
        cp('<PEON.ASSETS>/pisugar-server.json', '<PEON.INSTALLDIR.X+BIN>/etc/pisugar-server/config.json');
        cp('<PEON.ASSETS>/eeprom.conf',         '<PEON.INSTALLDIR.X+BIN>/etc/eeprom.conf');

        yield genOSRelease('<PEON.INSTALLDIR.X+BIN>/etc', 'Whispi', '<THIS.$VERSION>');
    test: none
    env: {}
  deploy: ''
  env:
    path: []
    other: {}
  embedded: true
  runtime:
    configure: ''
